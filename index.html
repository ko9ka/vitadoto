<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DM Chat</title>

<style>
body {
margin:0;
font-family: Arial;
background:#1a001f;
color:white;
display:flex;
height:100vh;
}

/* LEFT USERS */
#users {
width:250px;
background:#2a0033;
padding:10px;
overflow:auto;
}

.user {
display:flex;
align-items:center;
gap:10px;
padding:10px;
cursor:pointer;
background:#3a0047;
margin-bottom:8px;
border-radius:10px;
}

.avatar {
width:40px;
height:40px;
background:purple;
border-radius:8px;
}

/* CHAT */
#chat {
flex:1;
display:flex;
flex-direction:column;
}

#messages {
flex:1;
padding:10px;
overflow:auto;
}

.msg {
background:#3a0047;
padding:10px;
margin:5px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.like {
cursor:pointer;
color:#ff4dff;
}

#inputBox {
display:flex;
padding:10px;
background:#2a0033;
}

input {
flex:1;
padding:10px;
border:none;
border-radius:8px;
}

button {
margin-left:10px;
background:purple;
color:white;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
}

#login {
position:absolute;
top:0;left:0;right:0;bottom:0;
background:#1a001f;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}
</style>
</head>
<body>

<button onclick="googleLogin()">Войти через Google</button>
</div>

<div id="users"></div>

<div id="messages"></div>

<div id="inputBox">
<input id="text" placeholder="Напиши сообщение..."/>
<button onclick="send()">Отправить</button>
</div>
</div>

/* LOGIN */
window.googleLogin = function() {
const provider = new GoogleAuthProvider();
signInWithPopup(auth, provider);
}

onAuthStateChanged(auth,(user)=>{
if(user){
currentUser = user.displayName || "user";
document.getElementById("login").style.display="none";
loadUsers();
}
});

/* USERS UI */
function loadUsers(){
let box = document.getElementById("users");
box.innerHTML="";

usersList.forEach(u=>{
if(u === currentUser) return;

let div = document.createElement("div");
div.className="user";

div.innerHTML = `
<div class="avatar"></div>
<div>${u}</div>
`;

div.onclick = ()=>openChat(u);

box.appendChild(div);
});
}

/* CHAT ID */
function chatId(u1,u2){
return [u1,u2].sort().join("_");
}

/* OPEN CHAT */
function openChat(user){
selectedUser = user;
listen();
}

/* SEND */
window.send = async function(){
let text = document.getElementById("text").value;
if(!text || !selectedUser) return;

await addDoc(collection(db,"chats",chatId(currentUser,selectedUser),"messages"),{
text,
from: currentUser,
likes:0,
createdAt: serverTimestamp()
});

document.getElementById("text").value="";
}

/* LISTEN */
function listen(){
const q = query(
collection(db,"chats",chatId(currentUser,selectedUser),"messages"),
orderBy("createdAt")
);

onSnapshot(q,(snap)=>{
let box = document.getElementById("messages");
box.innerHTML="";

snap.forEach(doc=>{
let d = doc.data();

let div = document.createElement("div");
div.className="msg";

div.innerHTML=`
<div>
<b>${d.from}</b><br>
${d.text}
</div>
<div class="like">❤️ ${d.likes || 0}</div>
`;

box.appendChild(div);
});
});
}
</script>
