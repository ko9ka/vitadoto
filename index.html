<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>DM Purple</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#12001f;
  color:white;
  display:flex;
}

/* LEFT USERS */
#users {
  width:30%;
  background:#1b062b;
  height:100vh;
  overflow-y:auto;
  border-right:2px solid #2a0a3d;
}

.user {
  padding:15px;
  display:flex;
  align-items:center;
  gap:10px;
  cursor:pointer;
}

.user:hover {
  background:#2a0a3d;
}

.avatar {
  width:40px;
  height:40px;
  border-radius:8px;
  background:#a855f7;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

.avatar img {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* CHAT */
#chat {
  flex:1;
  display:flex;
  flex-direction:column;
  height:100vh;
}

#header {
  padding:15px;
  background:#2a0a3d;
}

#messages {
  flex:1;
  overflow-y:auto;
  padding:10px;
}

.msg {
  padding:10px;
  margin:8px;
  border-radius:10px;
  max-width:60%;
}

.me {
  background:#a855f7;
  margin-left:auto;
}

.other {
  background:#2e0a45;
}

#input {
  display:flex;
  padding:10px;
  gap:10px;
  background:#1b062b;
}

input {
  flex:1;
  padding:10px;
  border:none;
  outline:none;
}

button {
  background:#a855f7;
  border:none;
  color:white;
  padding:10px;
  cursor:pointer;
}

#loginBtn {
  position:absolute;
  right:10px;
  top:10px;
}
</style>
</head>

<body>

<div id="users"></div>

<div id="chat">
  <div id="header">
    💜 DM Chat
    <button id="loginBtn">Login</button>
  </div>

  <div id="messages"></div>

  <div id="input">
    <input id="text" placeholder="Написать...">
    <button id="send">Send</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

import {
  getFirestore,
  collection,
  getDocs,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCta0f_VfoXiC_TUV0r0IpyHOJHq5v9eoU",
  authDomain: "werr-6ef0d.firebaseapp.com",
  projectId: "werr-6ef0d",
  storageBucket: "werr-6ef0d.firebasestorage.app",
  messagingSenderId: "1091383193534",
  appId: "1:1091383193534:web:aea5b762a49e58188493ef",
  measurementId: "G-G2VGMJSXLX"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const provider = new GoogleAuthProvider();

let user = null;
let currentChat = null;

const usersDiv = document.getElementById("users");
const messagesDiv = document.getElementById("messages");
const input = document.getElementById("text");

// 🔥 LOGIN
document.getElementById("loginBtn").onclick = () => {
  signInWithPopup(auth, provider);
};

onAuthStateChanged(auth, async (u) => {
  user = u;
  if (user) {
    loadUsers();
  }
});

// 🔥 USERS LIST
async function loadUsers() {
  usersDiv.innerHTML = "";

  const snap = await getDocs(collection(db, "users"));

  snap.forEach(d => {
    const u = d.data();

    if (u.uid === user.uid) return;

    const div = document.createElement("div");
    div.className = "user";

    div.innerHTML = `
      <div class="avatar">
        ${u.photoURL ? `<img src="${u.photoURL}">` : u.name[0]}
      </div>
      <div>${u.name}</div>
    `;

    div.onclick = () => openChat(u);

    usersDiv.appendChild(div);
  });

  // save myself
  await addDoc(collection(db, "users"), {
    uid: user.uid,
    name: user.displayName,
    photoURL: user.photoURL
  });
}

// 🔥 CHAT ID
function chatId(uid1, uid2) {
  return [uid1, uid2].sort().join("_");
}

// 🔥 OPEN CHAT
function openChat(u) {
  currentChat = chatId(user.uid, u.uid);
  loadMessages();
}

// 🔥 LOAD MESSAGES
function loadMessages() {
  const q = query(
    collection(db, "chats", currentChat, "messages"),
    orderBy("createdAt")
  );

  onSnapshot(q, (snap) => {
    messagesDiv.innerHTML = "";

    snap.forEach(d => {
      const m = d.data();

      const div = document.createElement("div");
      div.className = "msg " + (m.senderId === user.uid ? "me" : "other");

      div.innerHTML = `<b>${m.senderName}</b><br>${m.text}`;

      messagesDiv.appendChild(div);
    });

    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  });
}

// 🔥 SEND MESSAGE
document.getElementById("send").onclick = async () => {
  if (!currentChat) return alert("Выбери чат");
  if (!input.value) return;

  await addDoc(collection(db, "chats", currentChat, "messages"), {
    text: input.value,
    senderId: user.uid,
    senderName: user.displayName,
    createdAt: serverTimestamp()
  });

  input.value = "";
};
</script>

</body>
</html>
