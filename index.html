<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>DM Chat</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#120018;
  color:white;
}

#login {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

button {
  padding:10px 20px;
  border:none;
  background:#a855f7;
  color:white;
  cursor:pointer;
  border-radius:10px;
}

#app {
  display:none;
  height:100vh;
  display:flex;
}

/* USERS LIST */
#users {
  width:250px;
  background:#1b0026;
  padding:10px;
}

.user {
  display:flex;
  align-items:center;
  padding:10px;
  cursor:pointer;
  border-bottom:1px solid #2d0a3d;
}

.avatar {
  width:45px;
  height:45px;
  background:#333;
  margin-right:10px;
  border-radius:8px; /* КВАДРАТ */
  overflow:hidden;
}

.avatar img {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* CHAT */
#chat {
  flex:1;
  display:flex;
  flex-direction:column;
}

#messages {
  flex:1;
  padding:10px;
  overflow-y:auto;
}

.msg {
  background:#2a003d;
  padding:10px;
  margin:10px;
  border-radius:10px;
  position:relative;
}

.like {
  position:absolute;
  right:10px;
  bottom:5px;
  cursor:pointer;
  color:#ff4dff;
}

#inputBox {
  display:flex;
}

input {
  flex:1;
  padding:10px;
  border:none;
}

</style>
</head>

<body>

<div id="login">
  <button onclick="googleLogin()">Войти через Google</button>
</div>

<div id="app">

  <div id="users"></div>

  <div id="chat">
    <div id="messages"></div>

    <div id="inputBox">
      <input id="text" placeholder="Сообщение...">
      <button onclick="sendMsg()">Отправить</button>
    </div>
  </div>

</div>

<script>
/* ================= FIREBASE ================= */

const firebaseConfig = {
  apiKey: "AIzaSyCta0f_VfoXiC_TUV0r0IpyHOJHq5v9eoU",
  authDomain: "werr-6ef0d.firebaseapp.com",
  projectId: "werr-6ef0d",
  storageBucket: "werr-6ef0d.firebasestorage.app",
  messagingSenderId: "1091383193534",
  appId: "1:1091383193534:web:aea5b762a49e58188493ef",
  measurementId: "G-G2VGMJSXLX"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* ================= USERS ================= */

const USERS = [
  {
    name:"мэдкид",
    photo:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTM0OjKY87dSdNw3LIs-7yHxIuleNv9u0EmsXeYX0h9vA&s"
  },
  {
    name:"fanatka masheri",
    photo:"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD..."
  },
  {
    name:"me",
    photo:"https://cdn-images.dzcdn.net/images/cover/8af82f9f4fd86ba086c184651d4c014f/500x500.jpg"
  }
];

let currentUser = null;
let selectedChat = "global";

/* ================= LOGIN ================= */

function googleLogin(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}

auth.onAuthStateChanged(user=>{
  if(user){
    currentUser = user;
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="flex";
    renderUsers();
    loadMessages();
  }
});

/* ================= USERS UI ================= */

function renderUsers(){
  const box = document.getElementById("users");
  box.innerHTML="";

  USERS.forEach(u=>{
    const div = document.createElement("div");
    div.className="user";
    div.onclick=()=>openChat(u.name);

    div.innerHTML=`
      <div class="avatar"><img src="${u.photo}"></div>
      <div>${u.name}</div>
    `;
    box.appendChild(div);
  });
}

/* ================= CHAT ================= */

function openChat(name){
  selectedChat = name;
  loadMessages();
}

function sendMsg(){
  const text = document.getElementById("text").value;

  if(!text) return;

  db.collection("messages").add({
    text,
    from: currentUser.displayName,
    chat: selectedChat,
    likes:0,
    created:Date.now()
  });

  document.getElementById("text").value="";
}

/* ================= LOAD ================= */

function loadMessages(){
  db.collection("messages")
    .where("chat","==",selectedChat)
    .orderBy("created")
    .onSnapshot(snap=>{
      const box = document.getElementById("messages");
      box.innerHTML="";

      snap.forEach(doc=>{
        const m = doc.data();

        const div = document.createElement("div");
        div.className="msg";

        div.innerHTML=`
          <b>${m.from}</b><br>
          ${m.text}
          <div class="like" onclick="likeMsg('${doc.id}',${m.likes})">
            ❤️ ${m.likes}
          </div>
        `;

        box.appendChild(div);
      });
    });
}

/* ================= LIKE ================= */

function likeMsg(id,likes){
  db.collection("messages").doc(id).update({
    likes: likes+1
  });
}

</script>

</body>
</html>
